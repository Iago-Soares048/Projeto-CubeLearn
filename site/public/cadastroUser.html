<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./styles/styles.css">
    <link rel="stylesheet" href="./styles/cadastroUsuario.css">
</head>

<body class="backgroundCadastroLogin">
    <header>
        <div class="nav_bar">
            <img src="./images/Logo+nome.png" alt="" class="logo">
            <div class="botoesD areanav">
                <a class="entrarb" href="./index.html">Voltar</a>
            </div>
        </div>
    </header>

    <section class="sessão-cadastro">
        <div id="cardDeErro" class="cardDeErro"></div>
        <div class="cadastro-box">
            <p>Cadastro</p>
            <div class="campos">

                <div class="campo">
                    <input id="nome_input" type="text" placeholder="Insira seu Nome">
                </div>

                <div class="campo">
                    <input id="email_input" type="text" placeholder="Insira seu email">
                </div>

                <div class="campo senha">
                    <input id="senha_input" type="password" placeholder="Sua senha" oninput="escrevendo()">
                </div>

                <div class="campo">
                    <input id="confirmacao_senha_input" type="password" placeholder="Repita sua senha"
                        oninput="escrevendo()">
                </div>

                <div class="verificacoes" id="verificacoes">
                    <div class="verificadores" id="verificadores">
                        <div class="indicador Ver_7" id="Ver_7"></div><span>Mais de 7 caracteres</span>
                    </div>
                    <div class="verificadores" id="verificadores">
                        <div class="indicador Ver_Minuscula" id="Ver_Minuscula"></div><span>Letra maiuscula</span>
                    </div>
                    <div class="verificadores" id="verificadores">
                        <div class="indicador Ver_Maiuscula" id="Ver_Maiuscula"></div><span>Letra minuscula</span>

                    </div>
                    <div class="verificadores" id="verificadores">
                        <div class="indicador Ver_Numero" id="Ver_Numero"></div><span>Número</span>
                    </div>
                </div>

            </div>

            <div class="butoes">
                <button class="cadastrob" onclick="cadastrar()">Cadastrar</button>
                <a href="./login.html">Já tenho uma conta</a>
            </div>

            
        </div>
        


    </section>
</body>

</html>

<script>
    // Array para armazenar empresas cadastradas para validação de código de ativação 
    let listaEmpresasCadastradas = [];

    function cadastrar() {
        // aguardar();

        //Recupere o valor da nova input pelo nome do id
        // Agora vá para o método fetch logo abaixo
        var nomeVar = nome_input.value;
        var emailVar = email_input.value;
        var senhaVar = senha_input.value;
        var confirmacaoSenhaVar = confirmacao_senha_input.value;

        // Verificando se há algum campo em branco
        

        if (nomeVar != "" && emailVar != "" && senhaVar != "" && confirmacaoSenhaVar != "" && senhaVar == confirmacaoSenhaVar) {


            fetch("/usuarios/cadastrar", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({
                    // crie um atributo que recebe o valor recuperado aqui
                    // Agora vá para o arquivo routes/usuario.js

                    nomeServer: nomeVar,
                    emailServer: emailVar,
                    senhaServer: senhaVar
                }),
            })
                .then(function (resposta) {
                    console.log("resposta: ", resposta);

                    if (resposta.ok) {
                        cardDeErro.style.display = "block";
                        /* 
                                            mensagem_erro.innerHTML =
                                                "Cadastro realizado com sucesso! Redirecionando para tela de Login..."; */

                        setTimeout(() => {
                            cardDeErro.innerHTML = `<h1>Redirecionando...</h1>`
                            window.location = "login.html"
                        }, 3000);

                        //  finalizarAguardar();
                    } else {
                        throw "Houve um erro ao tentar realizar o cadastro trhowwwwwww!";
                    }
                })
                .catch(function (resposta) {
                    console.log(`#ERRO: ${resposta}`);
                    // finalizarAguardar();
                });

            return false;
        } else if (senhaVar != confirmacaoSenhaVar) {

            cardDeErro.style.display = `flex`
            cardDeErro.innerHTML = `<h1>A senha deve ser igual nos dois campos!</h1>`
            setTimeout(() => {
                cardDeErro.style.display = `none`
                cardDeErro.innerHTML = ``
            }, 5000);
        } else {

            cardDeErro.style.display = `flex`
            cardDeErro.innerHTML = `<span>Preencha todos os campos!</span>`
            setTimeout(() => {
                cardDeErro.style.display = `none`
                cardDeErro.innerHTML = ``
            }, 5000);
        }
    }

    function escrevendo() {
        let senhaVar = senha_input.value;
        let seguranca = 0

        verificacoes.style.display = 'flex'

        if (senhaVar.includes("0") || senhaVar.includes("1") ||
            senhaVar.includes("2") || senhaVar.includes("3") ||
            senhaVar.includes("4") || senhaVar.includes("5") ||
            senhaVar.includes("6") || senhaVar.includes("7") ||
            senhaVar.includes("8") || senhaVar.includes("9")) {
            Ver_Numero.style.backgroundColor = 'green'
            seguranca++
        } else {
            Ver_Numero.style.backgroundColor = 'red'
        }
        
        if (senhaVar.toUpperCase() == senhaVar) {
            Ver_Minuscula.style.backgroundColor = 'red'
        }else {
            Ver_Minuscula.style.backgroundColor = 'green'
            seguranca++
        }

        if (senhaVar.toLowerCase() == senhaVar) {
            Ver_Maiuscula.style.backgroundColor = 'red'
        }else {
            Ver_Maiuscula.style.backgroundColor = 'green'
            seguranca++
        }

        if (senhaVar.length <= 7) {
            Ver_7.style.backgroundColor = 'red'
        }else {
            Ver_7.style.backgroundColor = 'green'
            seguranca++
        }

        if (senhaVar)
        if (seguranca == 4) {
        verificacoes.style.display = 'none'
        }




    }


</script>
