    function carregarPagina(cuboID) {
        zerarAPagina()
        sel_cubos.value = sessionStorage.getItem("CUBO_SELECIONADO")


        let dadosCubo = cubos[cuboID].dados

        record = dadosCubo[0].tempoSolucao
        piorTempo = dadosCubo[0].tempoSolucao


        for (let i = dadosCubo.length - 1; i >= 0; i--) {
            let tempoPAtual = dadosCubo[i].tempoSolucao;
            if (record > tempoPAtual) {
                record = tempoPAtual
            }

            if (piorTempo < tempoPAtual) {
                piorTempo = tempoPAtual
            }
        }


        linhasLista.innerHTML = ``
        for (let y = dadosCubo.length - 1; y >= 0; y--) {
            let dadoAtual = dadosCubo[y];

            if (dadoAtual.tempoSolucao == record) {
                linhasLista.innerHTML += `<div class="linhaLista record">
                        <span>${dadoAtual.horario.substring(12, dadoAtual.horario.length)}</span>
                    <span>${dadoAtual.tempoSolucao}</span>
                    </div>`

            } else if (dadoAtual.tempoSolucao == piorTempo) {
                linhasLista.innerHTML += `<div class="linhaLista piorTempo">
                        <span>${dadoAtual.horario.substring(12, dadoAtual.horario.length)}</span>
                    <span>${dadoAtual.tempoSolucao}</span>
                    </div>`

            } else {
                linhasLista.innerHTML += `<div class="linhaLista">
                        <span>${dadoAtual.horario.substring(12, dadoAtual.horario.length)}</span>
                    <span>${dadoAtual.tempoSolucao}</span>
                    </div>`
            }

        }



        mediaAtual = 0
        media12Atual = 0
        let maiorDaMedia12 = converterTempoParaNumero(dadosCubo[dadosCubo.length - 1].tempoSolucao)
        let maiorDaMedia5 = converterTempoParaNumero(dadosCubo[dadosCubo.length - 1].tempoSolucao)
        let menorDaMedia12 = converterTempoParaNumero(dadosCubo[dadosCubo.length - 1].tempoSolucao)
        let menorDaMedia5 = converterTempoParaNumero(dadosCubo[dadosCubo.length - 1].tempoSolucao)


        for (let i = dadosCubo.length - 1; i >= 0 && i >= dadosCubo.length - 12; i--) {
            let dadosCuboAtual = converterTempoParaNumero(dadosCubo[i].tempoSolucao)


            if (i > dadosCubo.length - 6 && dadosCubo.length >= 5) {
                mediaAtual += dadosCuboAtual

                if (dadosCuboAtual > maiorDaMedia5) {
                    maiorDaMedia5 = dadosCuboAtual
                }

                if (dadosCuboAtual < menorDaMedia5) {
                    menorDaMedia5 = dadosCuboAtual
                }
            }






            if (i >= dadosCubo.length - 12 && dadosCubo.length >= 12) {
                media12Atual += dadosCuboAtual

                if (dadosCuboAtual > maiorDaMedia12) {
                    maiorDaMedia12 = dadosCuboAtual
                }


                if (dadosCuboAtual < menorDaMedia12) {
                    menorDaMedia12 = dadosCuboAtual
                }
            }





        }

        if (!isNaN(mediaAtual) && dadosCubo.length >= 5) {
            mediaAtual = formatarTempo((mediaAtual - maiorDaMedia5 - menorDaMedia5) / 3)
        } else {
            mediaAtual = 0
        }

        if (!isNaN(media12Atual) && dadosCubo.length >= 12) {
            media12Atual = formatarTempo((media12Atual - maiorDaMedia12 - menorDaMedia12) / 10)
        } else {
            media12Atual = 0
        }





        medias.innerHTML = `<span>AVG5: ${mediaAtual}</span>
                    <span>AVG12: ${media12Atual} </span>`

        avg5span.innerHTML = mediaAtual
        avg12span.innerHTML = media12Atual
        recordspan.innerHTML = record
        piorTempoSpan.innerHTML = piorTempo

    }

    function selectFunc() {
        let cuboID = sel_cubos.value
        sessionStorage.CUBO_SELECIONADOID = cubos[cuboID].idCubo
        sessionStorage.CUBO_SELECIONADO = cuboID

        carregarPagina(cuboID)
        console.log(`Selecionou o cubo: ${cuboID}`)
    }



    function soltou(e) {
        if (parou) {
            parou = false
            return;
        }

        console.log("soltou", e);

        if (!intervalo && e.code == "Space") {
            console.log("entrou")
            iniciar()
        }
    }

    function apertou(e) {

        if (intervalo && e.code == "Space") {
            parar()
            parou = true
        }
    }

    let segundos = 0;
    let minutos = 0;
    let dMilissegundos = 0;
    let intervalo;
    let tempoInicio;
    let timerDisplay = ""

    function iniciar() {
        timerDisplay = ""
        tempoInicio = Date.now();
        sessaopagcronometro.innerHTML = `<div class="cronometro-content">
            
            <div class="cronometroBox">
                <p class="timer numbers rodando" id="timer">00:00.0</p>
                </div>
        </div>
        </div>`


        intervalo = setInterval(function () {
            let tempoPassado = Date.now() - tempoInicio;

            let minutos = Math.floor(tempoPassado / 60000);
            let segundos = Math.floor((tempoPassado % 60000) / 1000);
            let dMilissegundos = Math.floor((tempoPassado % 1000) / 100);

            if (minutos == 0) {
                timerDisplay = `${segundos}`
            } else if (segundos < 10) {
                timerDisplay = `${minutos}:0${segundos}`
            } else {
                timerDisplay = `${minutos}:${segundos}`

            }

            if (tempoPassado < 60000) {

            }

            timerDisplay += `.${dMilissegundos}`
            timer.innerHTML = timerDisplay
            tempoAtual = timerDisplay
        }, 100);


    }

    function parar() {

        zerarAPagina()

        clearInterval(intervalo);
        intervalo = null
        inserir(timerDisplay)

        setTimeout(() => {
            carregarDados()
        }, 17);




    }

    function inserir(tempoInserir) {
        let tempoInserirLet = tempoInserir

        fetch("/usuarios/inserir", {

                idCuboServer: idCubo

                console.log("resposta: ", resposta);

                    console.log(resposta)

                    throw "Houve um erro ao tentar realizar o cadastro do tempo!";
                }
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
                // finalizarAguardar();
            });
    }

    }

    function converterTempoParaNumero(tempo) {
        if (tempo.includes(':')) {
            let [min, seg] = tempo.split(":");
            return (parseInt(min) * 60) + parseFloat(seg);
        } else {
            return parseFloat(tempo);
        }
    }

    function formatarTempo(segundosTotais) {
        let minutos = Math.floor(segundosTotais / 60);
        let segundos = (segundosTotais % 60).toFixed(1);


        if (minutos > 0) {
            if (segundos < 10) {
                segundos = "0" + segundos;
            }
            return `${String(minutos).padStart(2, "0")}:${segundos}`;
        } else {
            return `${segundos}`;

        }


    }

    function calcularMelhorMedia() {
        // CALCULO DO MELHOR AVG12



        let menorTempo12 = dados[0].Tempo
        let maiorTempo12 = dados[0].Tempo
        let avg12atual = 0;
        for (let i = 0; i < dados.length; i++) {
            menorTempo12 = dados[0].Tempo
            maiorTempo12 = dados[0].Tempo
            avg12atual = 0;
            if (i >= 11) {
                for (let y = i; y > i - 12; y--) {
                    if (menorTempo12 > dados[y].Tempo) {
                        menorTempo12 = dados[y].Tempo
                    }

                    if (maiorTempo12 < dados[y].Tempo) {
                        maiorTempo12 = dados[y].Tempo
                    }

                    avg12atual += dados[y].Tempo
                }

                if (!isNaN(avg12atual)) {
                    avg12atual = (avg12atual - maiorTempo12 - menorTempo12) / 10
                } else {
                    avg12atual = 0
                }

                if (melhorMedia12 == 0 || avg12atual < melhorMedia12) {
                    melhorMedia12 = avg12atual
                }
            }

        }



        // CALCULO DO MELHOR AVG5



        let menorTempo5 = dados[0].Tempo
        let maiorTempo5 = dados[0].Tempo
        let avg5atual = 0;
        for (let i = 0; i < dados.length; i++) {
            menorTempo5 = dados[0].Tempo
            maiorTempo5 = dados[0].Tempo
            avg5atual = 0;
            if (i >= 4) {
                for (let y = i; y > i - 5; y--) {

                    if (menorTempo5 > dados[y].Tempo) {
                        menorTempo5 = dados[y].Tempo
                    }

                    if (maiorTempo5 < dados[y].Tempo) {
                        maiorTempo5 = dados[y].Tempo
                    }

                    avg5atual += dados[y].Tempo
                }

                if (!isNaN(avg5atual)) {
                    avg5atual = (avg5atual - maiorTempo5 - menorTempo5) / 3
                } else {
                    avg5atual = 0
                }

                if (melhorMedia5 == 0 || avg5atual < melhorMedia5) {
                    melhorMedia5 = avg5atual
                }
            }

        }
    }

                <div class="titulosLista">
