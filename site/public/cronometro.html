<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronometro</title>
    <link rel="stylesheet" href="./styles/cronometro.css">
</head>

<body onkeyup="soltou(event)" onkeydown="apertou(event)" onload="carregou()">

    <header>
        <div class="nav_bar">
            <img src="./images/Logo+nome.png" alt="" class="logo">
            <div class="botoesD areanav">
                <a class="entrarb" href="./index.html">Home</a>
                <a class="entrarb" href="./dash.html">DashBoard</a>
            </div>
        </div>
    </header>

    <section class="sessao-pagcronometro" id="sessaopagcronometro">

        <div class="listabox" id="listabox">
            <div class="dadosListaBox">
                <h1 class="cuboPag" id="cuboPag"></h1>
                <span>AVG12</span>
                <span>AVG5</span>
            </div>

            <div class="lista" id="lista">
                <div class="titulosLista">
                    <span>Horario</span>
                    <span>Tempo da solve</span>
                </div>
                <div class="linhaLista">
                </div>
            </div>
        </div>

        <div class="cronometro-content">

            <div class="cronometroBox">
                <p class="timer numbers" id="timer">00:00.0</p>
                <div class="medias" id="medias">
                    <span>AVG12:</span>
                    <span>AVG5:</span>
                </div>
            </div>
        </div>
        </div>
    </section>

</body>

<script>
    let parou = false
    let dados = []
    let tempoAtual = "";
    let media = 0
    let media12 = 0
    function carregou() {


        carregarLista()
    }



    function soltou(e) {
        if (parou) {
            parou = false
            return;
        }

        console.log("soltou", e);

        if (!intervalo && e.code == "Space") {
            console.log("entrou")
            iniciar()
        }
    }

    function apertou(e) {

        if (intervalo && e.code == "Space") {
            parar()
            parou = true
        }
    }

    let segundos = 0;
    let minutos = 0;
    let dMilissegundos = 0;
    let intervalo;
    let tempoInicio;
    let historicoTempos = []
    let timerDisplay = ""

    function iniciar() {
        timerDisplay = ""
        tempoInicio = Date.now();
        sessaopagcronometro.innerHTML = `<div class="cronometro-content">

            <div class="cronometroBox">
                <p class="timer numbers" id="timer">00:00.0</p>
                <div class="medias">
                    <span>AVG12: 432</span>
                    <span>AVG5: 432</span>
                </div>
            </div>
        </div>
        </div>`


        intervalo = setInterval(function () {
            let tempoPassado = Date.now() - tempoInicio;

            let minutos = Math.floor(tempoPassado / 60000);
            let segundos = Math.floor((tempoPassado % 60000) / 1000);
            let dMilissegundos = Math.floor((tempoPassado % 1000) / 100);

            if (minutos == 0) {
                timerDisplay = `${segundos}`
            } else if (segundos < 10) {
                timerDisplay = `${minutos}:0${segundos}`
            } else {
                timerDisplay = `${minutos}:${segundos}`

            }

            if (tempoPassado < 60000) {

            }

            timerDisplay += `.${dMilissegundos}`
            timer.innerHTML = timerDisplay
            tempoAtual = timerDisplay
        }, 100);


    }

    function parar() {


        sessaopagcronometro.innerHTML = `
        <div class="listabox" id="listabox">
            <div class="dadosListaBox">
                <h1 class="cuboPag" id="cuboPag"></h1>
                <span>AVG12</span>
                <span>AVG5</span>
            </div>

            <div class="lista" id="lista">
                <div class="titulosLista">
                    <span>Horario</span>
                    <span>Tempo da solve</span>
                </div>
                <div class="linhaLista">
                </div>
            </div>
        </div>

        <div class="cronometro-content">

            <div class="cronometroBox">
                <p class="timer numbers" id="timer">${tempoAtual}</p>
                <div class="medias">
                    <span>AVG5: ${media}}</span>
                    <span>AVG12: ${media12} </span>
                </div>
            </div>
        </div>
        </div>
        `
        clearInterval(intervalo);
        intervalo = null
        historicoTempos.push(timerDisplay)


        inserir(timerDisplay)
        setTimeout(() => {
            carregarLista()
        }, 7);

    }

    function inserir(tempoInserir) {
        let tempoInserirLet = tempoInserir

        fetch("/usuarios/inserir", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                // crie um atributo que recebe o valor recuperado aqui
                // Agora vá para o arquivo routes/usuario.js

                tempoServer: tempoInserirLet,
            }),
        })
            .then(function (resposta) {
                console.log("resposta: ", resposta);

                if (resposta.ok) {
                    console.log(resposta)
                    /* 
                                   mensagem_erro.innerHTML =
                                        "Cadastro realizado com sucesso! Redirecionando para tela de Login..."; */
                } else {
                    throw "Houve um erro ao tentar realizar o cadastro do tempo!";
                }
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
                // finalizarAguardar();
            });
    }



    function carregarLista() {

        // Aqui seria a função que obteria os dados do banco de dados
        // No caso, aqui você colocaria o fetch que teria o endereço da sua rota que você criou na pasta /routes e chamaria a função plotarGraficoLinha nessa função. Exemplo:

        // fetch('/obterDados')
        // .then(function(response){
        //   return response.json();
        // })
        // .then(function(data){
        //   plotarGraficoLinha(data);
        //   plotarGraficoBarra(data);
        // })
        // .catch(function(err){
        //   console.log(err);
        // })
        
        // Como eu não configurei as rotas, eu criei um array com os dados para simular a obtenção dos dados
        
        
        fetch("/usuarios/puxarDados", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: sessionStorage.EMAIL_USUARIO,
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")
            
            if (resposta.ok) {
                resposta.json().then(json => {
                    teste = json;
                    
                    dados = []
                    for (let i = 0; i < teste.length; i++) {
                        dados.push({
                            Usuario: json[i].usuario,
                            Horario: json[i].horaDoRegistro,
                            Tempo: json[i].tempoSolucao,
                            Modelo: json[i].modelo
                        })
                    }
                                        
                    for (let i = dados.length - 1; i >= 0; i--) {
                        lista.innerHTML += `<div class="linhaLista"> 
                    <span>${dados[i].Horario.substring(12, dados[i].Horario.length)}</span>
                    <span>${dados[i].Tempo}</span>
                        `
                    }

                    media = 0
                    media12 = 0


                    for (let i = dados.length - 1; i >= 0 && i > dados.length - 13; i--) {
                        if (i == dados.length - 13) {
                            console.log(`media5: ${media}`)
                            media += converterTempoParaNumero(dados[i].Tempo)
                            media12 += converterTempoParaNumero(dados[i].Tempo)
                        } else {
                            media12 += converterTempoParaNumero(dados[i].Tempo)
                        }
                    }

                    if (!isNaN(media)) {
                        media = formatarTempo( media / 5)
                    } else {
                        media = 0
                    }

                    if (!isNaN(media12)) {
                        media12 = formatarTempo( media12 / 12)
                    } else {
                        media12 = 0
                    }



                        medias.innerHTML = `
                    <span>AVG5: ${media}</span>
                    <span>AVG12: ${media12} </span>`
                        cuboPag.innerHTML += `<div class="dadoLista">Cubo:${dados[0].Modelo}</div>`
                    


                    /*          Usuario:${teste[0].usuario}<br> */
                    console.log(`é esse que eu quero ${json}`);
                    console.log(JSON.stringify(json));
                })


            } else {


                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    // finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })


        // Chamando a função para plotar o gráfico de linha com os dados
        // Chamando a função para plotar o gráfico de barra com os dados


        console.log(`teste:`)
    }

    function converterTempoParaNumero(tempo) {
    if (tempo.includes(':')) {
      let [min, seg] = tempo.split(":");
    return (parseInt(min) * 60) + parseFloat(seg);
  } else {
      return parseFloat(tempo);
    }
  }

    function formatarTempo(segundosTotais) {
    let minutos = Math.floor(segundosTotais / 60);
    let segundos = (segundosTotais % 60).toFixed(1);

    if (segundos < 10) {
      segundos = "0" + segundos;
    }
    

    return `${String(minutos).padStart(2, "0")}:${segundos}`;
  }

</script>

</html>
