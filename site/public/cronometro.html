<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Cronometro</title>
    <link rel="stylesheet" href="./styles/cronometro.css">
</head>

<body onkeyup="soltou(event)" onkeydown="apertou(event)" onload="carregou()">

    <header>
        <div class="nav_bar">
            <img src="./images/Logo+nome.png" alt="" class="logo">
            <div class="botoesD areanav">

                <a class="entrarb" href="./dash.html">DashBoard</a>
            </div>
        </div>
    </header>
    
    <section class="sessao-pagcronometro">
        <div class="listabox">
            <div class="lista" id="lista"></div>
        </div>
        <div class="cronometro-content">

            <div class="cronometroBox">
                <p class="timer numbers" id="timer">00:00.0</p>
                <div class="medias">
                    <span>AVG12: 432</span>
                    <span>AVG5: 432</span>
                </div>
            </div>
        </div>
        </div>
    </section>

</body>

<script>
    let parou = false
    function carregou() {
        carregarLista()
    }



    function soltou(e) {
        if (parou) {
            parou = false
            return;
        }

        console.log("soltou", e);

        if (!intervalo && e.code == "Space") {
            console.log("entrou")
            iniciar()
        }
    }

    function apertou(e) {

        if (intervalo && e.code == "Space") {
            parar()
            parou = true
        }
    }

    let segundos = 0;
    let minutos = 0;
    let dMilissegundos = 0;
    let intervalo;
    let tempoInicio;
    let historicoTempos = []
    let timerDisplay = ""

    function iniciar() {
        timerDisplay = ""
        tempoInicio = Date.now();

        intervalo = setInterval(function () {
            let tempoPassado = Date.now() - tempoInicio;

            let minutos = Math.floor(tempoPassado / 60000);
            let segundos = Math.floor((tempoPassado % 60000) / 1000);
            let dMilissegundos = Math.floor((tempoPassado % 1000) / 100);

            if (minutos == 0) {
                timerDisplay = `${segundos}`
            } else if (segundos < 10) {
                timerDisplay = `${minutos}:0${segundos}`
            } else {
                timerDisplay = `${minutos}:${segundos}`

            }

            if (tempoPassado < 60000) {

            }

            timerDisplay += `.${dMilissegundos}`

            timer.innerHTML = timerDisplay
        }, 100);


    }

    function parar() {
        clearInterval(intervalo);
        intervalo = null
        historicoTempos.push(timerDisplay)


        inserir(timerDisplay)
        exibir()
        carregarLista()



    }

    function inserir(tempoInserir) {
        let tempoInserirLet = tempoInserir

        fetch("/usuarios/inserir", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                // crie um atributo que recebe o valor recuperado aqui
                // Agora vá para o arquivo routes/usuario.js

                tempoServer: tempoInserirLet,
            }),
        })
            .then(function (resposta) {
                console.log("resposta: ", resposta);

                if (resposta.ok) {
                    console.log(resposta)
                    /* 
                                   mensagem_erro.innerHTML =
                                        "Cadastro realizado com sucesso! Redirecionando para tela de Login..."; */
                } else {
                    throw "Houve um erro ao tentar realizar o cadastro do tempo!";
                }
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
                // finalizarAguardar();
            });
    }

    function exibir() {
        let mensagem = ""

        for (let i = historicoTempos.length - 1; i >= 0; i--) {
            mensagem += `${i + 1}° - ${historicoTempos[i]} <br>`
        }
        lista.innerHTML = mensagem
    }

        // Como eu não configurei as rotas, eu criei um array com os dados para simular a obtenção dos dados


        fetch("/usuarios/puxarDados", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: sessionStorage.EMAIL_USUARIO,
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {

                    }

                    let dia = teste[0].horaDoRegistro

                    let anoF = dia.substring(0, 4)


                    for (let i = dados.length -1; i >= 0; i--) {
                        lista.innerHTML += `<div class="linhaLista">
                        Desc:${dados[i].Modelo}<br>

                        </div>
                        `
                    }
                    /*          Usuario:${teste[0].usuario}<br> */
                    console.log(`é esse que eu quero ${json}`);
                    console.log(JSON.stringify(json));
                })


            } else {

                resposta.text().then(texto => {

        }).catch(function (erro) {

        })


        // Chamando a função para plotar o gráfico de linha com os dados

</script>
