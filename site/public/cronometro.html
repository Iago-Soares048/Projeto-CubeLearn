<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronometro</title>
    <link rel="stylesheet" href="./styles/styles.css">
</head>

<body onkeyup="soltou(event)" onkeydown="apertou(event)">

    <header>
        <div class="nav_bar">
            <img src="./images/Logo+nome.png" alt="" class="logo">
            <div class="botoesD areanav">
                <a class="entrarb" href="./index.html">Voltar</a>
            </div>
        </div>
    </header>

    <div class="cronometro-content">

        <div class="cronometroBox">
            <h1>timer</h1>
            <p id="timer">00:00.000</p>
            <div class="botoes">
                <button onclick="iniciar()">Iniciar</button>
                <button onclick="parar()">Parar</button>
            </div>
        </div>
    </div>
    <div class="listabox">
        <div id="div_mensagem"></div>
        <div class="lista" id="lista"></div>
    </div>

</body>

<script>
    let parou = false

    function soltou(e) {
        if (parou) {
            parou = false
            return;
        }

        console.log("soltou", e);
        div_mensagem.innerHTML = `Tecla pressionada ${e.code}`

        if (!intervalo && e.code == "Space") {
            console.log("entrou")
            iniciar()
        }
    }

    function apertou(e) {

        if (intervalo && e.code == "Space") {
            parar()
            parou = true
        }
    }

    let segundos = 0;
    let minutos = 0;
    let dMilissegundos = 0;
    let intervalo;
    let tempoInicio;
    let historicoTempos = []
    let timerDisplay = ""

    function iniciar() {
        timerDisplay = ""
        tempoInicio = Date.now();

        intervalo = setInterval(function () {
            let tempoPassado = Date.now() - tempoInicio;

            let minutos = Math.floor(tempoPassado / 60000);
            let segundos = Math.floor((tempoPassado % 60000) / 1000);
            let dMilissegundos = Math.floor((tempoPassado % 1000) / 100);

            if (segundos < 10 && minutos < 10) {
                timerDisplay = `0${minutos}:0${segundos}`
            } else if (segundos < 10) {
                timerDisplay = `${minutos}:0${segundos}`
            } else if (minutos < 10) {
                timerDisplay = `0${minutos}:${segundos}`
            } else {
                timerDisplay = `${minutos}:${segundos}`
            }
            timerDisplay += `.${dMilissegundos}`

            timer.innerHTML = timerDisplay
        }, 100);


    }

    function parar() {
        clearInterval(intervalo);
        intervalo = null
        historicoTempos.push(timerDisplay)


        inserir(timerDisplay)
        exibir()


    }

    function inserir(tempoInserir) {
        let tempoInserirLet = tempoInserir

        fetch("/usuarios/inserir", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                // crie um atributo que recebe o valor recuperado aqui
                // Agora vá para o arquivo routes/usuario.js

                tempoServer: tempoInserirLet,
            }),
        })
            .then(function (resposta) {
                console.log("resposta: ", resposta);

                if (resposta.ok) {
                    cardErro.style.display = "block";
                    /* 
                                   mensagem_erro.innerHTML =
                                        "Cadastro realizado com sucesso! Redirecionando para tela de Login..."; */
                } else {
                    throw "Houve um erro ao tentar realizar o cadastro do tempo!";
                }
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
                // finalizarAguardar();
            });
    }

    function exibir() {
        let mensagem = ""

        for (let i = historicoTempos.length - 1; i >= 0; i--) {
            mensagem += `${i + 1}° - ${historicoTempos[i]} <br>`
        }
        lista.innerHTML = mensagem
    }
</script>

</html>
