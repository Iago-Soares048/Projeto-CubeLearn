<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">

  <!-- Incluindo a biblioteca Chart.js para desenhar gráficos -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="stylesheet" href="./styles/styles.css">



</head>

<body onload="obterDados()"> <!-- Chamando a função obterDados ao carregar a página -->
  <header>
    <div class="nav_bar">
      <img src="./images/Logo+nome.png" alt="" class="logo">

  </header>
  <div class="container">

    <div class="esquerda">
      <section class="historico">

        <div class="lista_historico" id="lista_historico"></div>

        <div class="legendaHistorico">

          </p>
          <p>Melhor tempo:
          <div style="height: 100%; width: 18px; border-radius: 100px; background-color: rgb(50, 177, 107);"></div>
          </p>
        </div>
      </section>

      <section class="kpi-section">
        <h1 class="titulo-secao">KPIs</h1>

        <div class="kpis">
          <div class="kpi-cards">
            <div class="kpi-card">
              <h2>Tempo Record</h2>

            <div class="kpi-card">
              <h2>Pior Tempo</h2>
              <p id="kpi_pior">00:18.92</p>
            </div>
          </div>

          <div class="kpi-cards">

            <div class="kpi-card">
              <h2>Melhor AVG12</h2>
              <p id="kpi_avg12">00:14.21</p>
            </div>

            <div class="kpi-card">
              <h2>Melhor AVG5</h2>
              <p id="kpi_avg5">00:13.54</p>
            </div>
          </div>
        </div>
      </section>
    </div>



    <section class="graficoGeral">
      <section class="grafico-section">
        <h1 class="titulo-secao">Gráfico do Histórico de solves</h1>

        <div class="grafico-area">
          <canvas id="linha"></canvas>
        </div>
      </section>
      <section class="grafico-section2">
        <h1 class="titulo-secao">Gráfico do Histórico de records</h1>

        <div class="grafico-area">
          <canvas id="linha"></canvas>
        </div>
      </section>
    </section>


  </div>


  <!-- <div id="div_mensagem"></div> -->

</body>

</html>
<script>
  let teste = []
  let dados = []
  let record = 0
  let piorTempo = 0
  let media = 0
  let media12 = 0


  // Função chamada ao carregar a página para obter e processar os dados
  function obterDados() {
    // Aqui seria a função que obteria os dados do banco de dados
    // No caso, aqui você colocaria o fetch que teria o endereço da sua rota que você criou na pasta /routes e chamaria a função plotarGraficoLinha nessa função. Exemplo:

    // fetch('/obterDados')
    // .then(function(response){
    //   return response.json();
    // })
    // .then(function(data){
    //   plotarGraficoLinha(data);
    //   plotarGraficoBarra(data);
    // })
    // .catch(function(err){
    //   console.log(err);
    // })

    // Como eu não configurei as rotas, eu criei um array com os dados para simular a obtenção dos dados


    fetch("/usuarios/puxarDados", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        emailServer: sessionStorage.EMAIL_USUARIO,
      })
    }).then(function (resposta) {
      console.log("ESTOU NO THEN DO entrar()!")

      if (resposta.ok) {
        resposta.json().then(json => {
          teste = json;

          dados = []

          for (let i = 0; i < teste.length; i++) {
            dados.push({
              Horario: json[i].horaDoRegistro,
              Tempo: converterTempoParaNumero(json[i].tempoSolucao)
            })
          }
          plotarGraficoLinha(dados);
          plotarHistorico(dados);
        })


      } else {


        console.log("Houve um erro ao tentar realizar o login!");

        resposta.text().then(texto => {
          console.error(texto);
          // finalizarAguardar(texto);
        });
      }

    }).catch(function (erro) {
      console.log(erro);
    })


    // Chamando a função para plotar o gráfico de linha com os dados
    // Chamando a função para plotar o gráfico de barra com os dados


    console.log(`teste:`)
  }

function converterTempoParaNumero(tempo) {
    if (tempo.includes(":")) {
        let posicaoDoisPontos = tempo.indexOf(":");

        let minutos = Number(tempo.substring(0, posicaoDoisPontos));
        let segundos = Number(tempo.substring(posicaoDoisPontos + 1));

        return (minutos * 60) + segundos;
    } else {
        return Number(tempo);
    }
}


  function formatarTempo(segundosTotais) {
    let minutos = Math.floor(segundosTotais / 60);
    let segundos = (segundosTotais % 60).toFixed(1);

    if (segundos < 10) {
      segundos = "0" + segundos;
    }


    return `${minutos.toString()}:${segundos}`;
  }

  let tempos = [];
  let horarios = [];

  // Função para plotar o gráfico de linha
  function plotarGraficoLinha(dados) {

    tempos = [];
    horarios = [];

    for (let i = 0; i < dados.length; i++) {
      tempos.push(dados[i].Tempo);
      horarios.push(dados[i].Horario.substring(11, 19)); // mostra só hora
    }

    var ctx = document.getElementById('linha').getContext('2d');

    let myChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: horarios,
        datasets: [{
          label: 'Tempo de Solução',
          data: tempos,
          borderWidth: 2,
          pointRadius: 4,
          tension: 0.2
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,

        scales: {
          y: {
            ticks: {
              callback: function (value) {
                return formatarTempo(value);
              }
            }
          }
        },

        plugins: {
          tooltip: {
            enabled: true,
            callbacks: {
              title: function (context) {
                return "Horário: " + context[0].label;
              },
              label: function (context) {
                return "Tempo: " + formatarTempo(context.raw);
              }
            }
          }
        }

      }
    });
  }

  function plotarHistorico(dados) {




    // CALCULO DO RECORDE


    record = dados[0].Tempo
    for (let i = 0; i < dados.length; i++) {
      let tempoPAtual = dados[i].Tempo;
      if (record > tempoPAtual) {
        record = tempoPAtual
      }
    }

    // CALCULO DO PIOR TEMPO


    piorTempo = dados[0].Tempo
    for (let i = 0; i < dados.length; i++) {
      let tempoPAtual = dados[i].Tempo;
      if (piorTempo < tempoPAtual) {
        piorTempo = tempoPAtual
      }
    }



    // CALCULO DO MELHOR AVG12



    let menorTempo12 = dados[0].Tempo
    let maiorTempo12 = dados[0].Tempo
    let avg12atual = 0;
    for (let i = 0; i < dados.length; i++) {
      menorTempo12 = dados[0].Tempo
      maiorTempo12 = dados[0].Tempo
      avg12atual = 0;
      if (i >= 11) {
        for (let y = i; y > i - 12; y--) {
          if (menorTempo12 > dados[y].Tempo) {
            menorTempo12 = dados[y].Tempo
          }

          if (maiorTempo12 < dados[y].Tempo) {
            maiorTempo12 = dados[y].Tempo
          }

          avg12atual += dados[y].Tempo
        }

        if (!isNaN(avg12atual)) {
          avg12atual = (avg12atual - maiorTempo12 - menorTempo12) / 10
        } else {
          avg12atual = 0
        }

        if (media12 == 0 || avg12atual < media12) {
          media12 = avg12atual
        }
      }

    }



    // CALCULO DO MELHOR AVG5



    let menorTempo5 = dados[0].Tempo
    let maiorTempo5 = dados[0].Tempo
    let avg5atual = 0;
    for (let i = 0; i < dados.length; i++) {
      menorTempo5 = dados[0].Tempo
      maiorTempo5 = dados[0].Tempo
      avg5atual = 0;
      if (i >= 4) {
        for (let y = i; y > i - 5; y--) {

          if (menorTempo5 > dados[y].Tempo) {
            menorTempo5 = dados[y].Tempo
          }

          if (maiorTempo5 < dados[y].Tempo) {
            maiorTempo5 = dados[y].Tempo
          }

          avg5atual += dados[y].Tempo
        }

        if (!isNaN(avg5atual)) {
          avg5atual = (avg5atual - maiorTempo5 - menorTempo5) / 3
        } else {
          avg5atual = 0
        }

        if (media == 0 || avg5atual < media) {
          media = avg5atual
        }
      }

    }





    // EXIBIÇÃO NAS KPIs




    if (dados.length < 12) {
      kpi_avg12.innerHTML = `Não há 12 registros ainda`
    } else {
      kpi_avg12.innerHTML = formatarTempo(media12)
    }

    if (dados.length < 5) {
      kpi_avg5.innerHTML = `Não há 5 registros ainda`
    } else {
      kpi_avg5.innerHTML = formatarTempo(media)
    }

    kpi_record.innerHTML = formatarTempo(record)
    kpi_pior.innerHTML = formatarTempo(piorTempo)

    // EXIBIÇÃO NO HISTÓRICO DE TEMPOS

    let contador = 1
    for (let i = dados.length - 1; i >= 0; i--) {
      if (dados[i].Tempo == record) {
        lista_historico.innerHTML += `<div class="solve-item record">Solve ${i + 1} - ${formatarTempo(dados[i].Tempo)} </div>`
      } else if (dados[i].Tempo == piorTempo) {
        lista_historico.innerHTML += `<div class="solve-item piorLinha">Solve ${i + 1} - ${formatarTempo(dados[i].Tempo)} </div>`
      } else {
        lista_historico.innerHTML += `<div class="solve-item">Solve ${i + 1} - ${formatarTempo(dados[i].Tempo)} </div>`
      }
      contador++
    }
  }

  console.log(dados)
</script>
