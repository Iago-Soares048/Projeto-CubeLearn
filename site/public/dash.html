  function converterTempoParaNumero(tempo) {
    if (tempo.includes(':')) {
      let [min, seg] = tempo.split(":");
    return (parseInt(min) * 60) + parseFloat(seg);
  } else {
      return parseFloat(tempo);
    }
  }


  function formatarTempo(segundosTotais) {
    let minutos = Math.floor(segundosTotais / 60);
    let segundos = (segundosTotais % 60).toFixed(1);

    if (segundos < 10) {
      segundos = "0" + segundos;
    }
    

    return `${String(minutos).padStart(2, "0")}:${segundos}`;
  }

  let tempos = [];
  let horarios = [];

  // Função para plotar o gráfico de linha
  function plotarGraficoLinha(dados) {

    // Separando os rótulos (labels) e os dados dos votos
    tempos = [];
    horarios = [];

    for (let i = 0; i < dados.length; i++) {
      tempos.push(dados[i].Tempo);
      horarios.push(dados[i].Horario);
    }

    // Capturando o elemento canvas pelo id 
    var ctx = document.getElementById('linha').getContext('2d');
    // Criando o gráfico de linha usando o Chart.js
    let myChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: horarios,
        datasets: [{
          label: 'Tempo de Solução',
          data: tempos,
          options: {
            responsive: true,
            maintainAspectRatio: false,
          }
        }]
      },
      options: {
        scales: {
          y: {
            ticks: {
              callback: function (value) {
                return formatarTempo(value);
              }
            }
          }
        },
        plugins: {
          tooltip: {
            callbacks: {
              label: function (context) {
                return "Tempo: " + formatarTempo(context.raw);
              }
            }
          }
        }
      }
    });
  }

  function plotarHistorico(dados) {
    let contador = 1
    for (let i = dados.length -1; i >= 0 ; i--) {
      lista_historico.innerHTML += `<div class="solve-item">Solve ${i + 1}# - ${dados[i].Tempo} </div>`
      contador++
    }
  }

  console.log(dados)
</script>
