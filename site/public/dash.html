  function selectFunc() {
    let cuboID = sel_cubos.value
    sessionStorage.CUBO_SELECIONADOID = cubos[cuboID].idCubo
    sessionStorage.CUBO_SELECIONADO = cuboID

    plotarGraficoLinha(cubos[sessionStorage.getItem("CUBO_SELECIONADO")].dados)
    plotarHistorico(cubos[sessionStorage.getItem("CUBO_SELECIONADO")].dados)
    console.log(`Selecionou o cubo: ${cuboID}`)
  }

  function converterTempoParaNumero(tempo) {
    if (tempo.includes(":")) {
      let posicaoDoisPontos = tempo.indexOf(":");

      let minutos = Number(tempo.substring(0, posicaoDoisPontos));
      let segundos = Number(tempo.substring(posicaoDoisPontos + 1));

      return (minutos * 60) + segundos;
    } else {
      return Number(tempo);
    }
  }


  function formatarTempo(segundosTotais) {
    let minutos = Math.floor(segundosTotais / 60);
    let segundos = (segundosTotais % 60).toFixed(1);

    if (segundos < 10) {
      segundos = "0" + segundos;
    }


    return `${minutos.toString()}:${segundos}`;
  }

  let tempos = [];
  let horarios = [];

  // Função para plotar o gráfico de linha
  function plotarGraficoLinha(dados) {

    tempos = [];
    horarios = [];

    for (let i = 0; i < dados.length; i++) {
      tempos.push(dados[i].tempoSolucao);
      horarios.push(dados[i].horario.substring(11, 19)); // mostra só hora
    }

    if (myChart) {
      myChart.destroy();
    }

    var ctx = document.getElementById('linha').getContext('2d');

    myChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: horarios,
        datasets: [{
          label: 'Tempo de Solução',
          data: tempos,
          borderWidth: 2,
          pointRadius: 4,
          tension: 0.2
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,

        scales: {
          y: {
            ticks: {
              callback: function (value) {
                return formatarTempo(value);
              }
            }
          }
        },

        plugins: {
          tooltip: {
            enabled: true,
            callbacks: {
              label: function (context) {
                return "Horário: " + context[0].label;
              },
              label: function (context) {
                return "Tempo: " + formatarTempo(context.raw);
              },

            }
          }
        }

      }
    });
  }

  function plotarHistorico(dados) {




    // CALCULO DO RECORDE


    record = dados[0].tempoSolucao
    for (let i = 0; i < dados.length; i++) {
      let tempoPAtual = dados[i].tempoSolucao;
      if (record > tempoPAtual) {
        record = tempoPAtual
      }
    }

    // CALCULO DO PIOR TEMPO


    piorTempo = dados[0].tempoSolucao
    for (let i = 0; i < dados.length; i++) {
      let tempoPAtual = dados[i].tempoSolucao;
      if (piorTempo < tempoPAtual) {
        piorTempo = tempoPAtual
      }
    }



    // CALCULO DO MELHOR AVG12



    let menorTempo12 = dados[0].tempoSolucao
    let maiorTempo12 = dados[0].tempoSolucao
    let avg12atual = 0;
    for (let i = 0; i < dados.length; i++) {
      menorTempo12 = dados[0].tempoSolucao
      maiorTempo12 = dados[0].tempoSolucao
      avg12atual = 0;
      if (i >= 11) {
        for (let y = i; y > i - 12; y--) {
          if (menorTempo12 > dados[y].tempoSolucao) {
            menorTempo12 = dados[y].tempoSolucao
          }

          if (maiorTempo12 < dados[y].tempoSolucao) {
            maiorTempo12 = dados[y].tempoSolucao
          }

          avg12atual += dados[y].tempoSolucao
        }

        if (!isNaN(avg12atual)) {
          avg12atual = (avg12atual - maiorTempo12 - menorTempo12) / 10
        } else {
          avg12atual = 0
        }

        if (media12 == 0 || avg12atual < media12) {
          media12 = avg12atual
        }
      }

    }



    // CALCULO DO MELHOR AVG5



    let menorTempo5 = dados[0].tempoSolucao
    let maiorTempo5 = dados[0].tempoSolucao
    let avg5atual = 0;
    for (let i = 0; i < dados.length; i++) {
      menorTempo5 = dados[0].tempoSolucao
      maiorTempo5 = dados[0].tempoSolucao
      avg5atual = 0;
      if (i >= 4) {
        for (let y = i; y > i - 5; y--) {

          if (menorTempo5 > dados[y].tempoSolucao) {
            menorTempo5 = dados[y].tempoSolucao
          }

          if (maiorTempo5 < dados[y].tempoSolucao) {
            maiorTempo5 = dados[y].tempoSolucao
          }

          avg5atual += dados[y].tempoSolucao
        }

        if (!isNaN(avg5atual)) {
          avg5atual = (avg5atual - maiorTempo5 - menorTempo5) / 3
        } else {
          avg5atual = 0
        }

        if (media == 0 || avg5atual < media) {
          media = avg5atual
        }
      }

    }





    // EXIBIÇÃO NAS KPIs

    lista_historico.innerHTML = ""


    if (dados.length < 12) {
      kpi_avg12.innerHTML = `Não há 12 registros ainda`
    } else {
      kpi_avg12.innerHTML = formatarTempo(media12)
    }

    if (dados.length < 5) {
      kpi_avg5.innerHTML = `Não há 5 registros ainda`
    } else {
      kpi_avg5.innerHTML = formatarTempo(media)
    }

    kpi_record.innerHTML = formatarTempo(record)
    kpi_pior.innerHTML = formatarTempo(piorTempo)

    // EXIBIÇÃO NO HISTÓRICO DE TEMPOS

    let contador = 1
    for (let i = dados.length - 1; i >= 0; i--) {
      if (dados[i].tempoSolucao == record) {
        lista_historico.innerHTML += `<div class="solve-item record">Solve ${i + 1} - ${formatarTempo(dados[i].tempoSolucao)} </div>`
      } else if (dados[i].tempoSolucao == piorTempo) {
        lista_historico.innerHTML += `<div class="solve-item piorLinha">Solve ${i + 1} - ${formatarTempo(dados[i].tempoSolucao)} </div>`
      } else {
        lista_historico.innerHTML += `<div class="solve-item">Solve ${i + 1} - ${formatarTempo(dados[i].tempoSolucao)} </div>`
      }
      contador++
    }
  }

  console.log(dados)
</script>
