<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./styles/styles.css">
</head>

<body class="backgroundCadastroLogin">
    <header>
        <div class="nav_bar">
            <img src="./images/Logo+nome.png" alt="" class="logo">
            <div class="botoesD areanav">
                <a class="entrarb" href="./index.html">Voltar</a>
            </div>
        </div>
    </header>

    <section class="sessão-cadastro">
        <div class="cadastro-box">
            <p>Login</p>
            <div>
                <div class="campo"><img src="./images/gmail.png" class="emailimg" ><input type="text" id="email_input"
                        placeholder="Insira seu email"></div>
                <div class="campo"><img src="./images/padlock.png" class="emailimg" ><input type="password" id="senha_input"
                        placeholder="Sua senha"></div>
            </div>

            <div class="butoes">
                <button onclick="entrar()" class="cadastrob">Login</button>
                <a href="./cadastro.html" class="">Não tenho uma conta</a>
            </div>

        </div>
    </section>
</body>

</html>

<script>
    function entrar() {
        // aguardar();

        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        if (emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
           // finalizarAguardar();
            return false;
        }
        else {
            setInterval(5000)
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id

                    setTimeout(function () {
                        window.location = "cronometro.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    // finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

/*     function sumirMensagem() {
        cardErro.style.display = "none"
    } */
</script>
