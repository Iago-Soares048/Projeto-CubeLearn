<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./styles/cadastroUsuario.css">
    <link rel="stylesheet" href="./styles/styles.css">
</head>

<body class="backgroundCadastroLogin">
    <header>
        <div class="nav_bar">
            <img src="./images/Logo+nome.png" alt="" class="logo">
            <div class="botoesD areanav">
                <a class="entrarb" href="./index.html">Voltar</a>
            </div>
        </div>
    </header>

    <section class="sessão-cadastro">
        
        <div class="cadastro-box">
            <p>Bem vindo de volta!</p>
            <div>
                <div class="campo"><input type="text" id="email_input"
                        placeholder="Insira seu email"></div>
                <div class="campo"><input type="password" id="senha_input"
                        placeholder="Sua senha"></div>
            </div>

            <div class="butoes">
                <a onclick="entrar()" class="entrarCb">Entrar</a>
            </div>
            <a class="registrarb" href="./cadastroUser.html">Não tem conta? Crie uma</a>
            
        </div>
        <div id="cardDeErro" class="cardDeErro"></div>
    </section>
</body>

</html>

<script>

    function entrar() {
        // aguardar();

        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        if (emailVar == "" || senhaVar == "") {
            cardDeErro.style.display = `flex`
            cardDeErro.innerHTML = `<span>Preencha todos os campos!</span>`
            setTimeout(() => {
                cardDeErro.style.display = `none`
                cardDeErro.innerHTML = ``
            }, 5000);

            return false;
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
                
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id

                    setTimeout(function () {
                        window.location = "index.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                cardDeErro.style.display = `flex`
            cardDeErro.innerHTML = `<span>Usuário ou senha incorretos</span>`
            setTimeout(() => {
                cardDeErro.style.display = `none`
                cardDeErro.innerHTML = ``
            }, 5000);

                resposta.text().then(texto => {
                    console.error(texto);
                    // finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

/*     function sumirMensagem() {
        cardErro.style.display = "none"
    } */
</script>
